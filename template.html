<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATH // Telemetry Finalized</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --plath-orange: #FF3300; --plath-black: #000000; --plath-dark-grey: #111111;
            --plath-border: #333333; --plath-text-main: #FFFFFF; --plath-text-dim: #999999;
            --font-stack: 'JetBrains Mono', monospace;
        }
        body { background-color: var(--plath-black); color: var(--plath-text-main); font-family: var(--font-stack); margin: 0; padding: 0; }
        header { border-bottom: 1px solid var(--plath-border); padding: 20px; display: flex; justify-content: space-between; }
        .logo span { color: var(--plath-orange); }
        .container { max-width: 750px; margin: 40px auto 80px; padding: 0 20px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 40px; }
        @media (max-width: 600px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .metric-card { background-color: var(--plath-dark-grey); border: 1px solid var(--plath-border); padding: 20px; }
        .metric-card.highlight { border-color: var(--plath-orange); }
        .metric-label { font-size: 0.75rem; color: var(--plath-orange); text-transform: uppercase; margin-bottom: 5px; }
        .metric-value { font-size: 1.1rem; font-weight: 600; }
        .story-section { border: 1px solid var(--plath-border); background-color: var(--plath-dark-grey); padding: 40px; }
        .story-header { border-bottom: 1px solid var(--plath-border); padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; }
        .story-title { font-size: 1.4rem; text-transform: uppercase; margin: 0; }
        .story-body p { font-size: 1rem; line-height: 1.8; margin-bottom: 20px; }
        .action-footer { margin-top: 30px; display: flex; gap: 15px; }
        .btn { flex: 1; padding: 15px; text-align: center; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; cursor: pointer; font-family: var(--font-stack); }
        .btn-primary { background-color: var(--plath-orange); color: #000; border: none; }
        .btn-secondary { background-color: transparent; color: var(--plath-text-dim); border: 1px solid var(--plath-border); }
        
        /* Web Story Export Layout Modification */
        @media print {
            header, .action-footer, .metric-card:not(.highlight) { display: none !important; }
            body { background-color: #000000; }
            .container { margin: 0; padding: 0; max-width: 100%; }
            .story-section { border: none; background: transparent; padding: 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>PLATH</span>//ENGINE</div>
        <div>// TELEMETRY_RESOLVED</div>
    </header>
    <div class="container">
        <div class="dashboard-grid">
            <div class="metric-card">
                <div class="metric-label">Identity Anchor</div>
                <div class="metric-value">{{fullName}}</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Node Alias</div>
                <div class="metric-value">{{currentName}}</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Temporal Origin</div>
                <div class="metric-value">{{birthDate}}</div>
            </div>
            <div class="metric-card highlight">
                <div class="metric-label">Calculated Matrix</div>
                <div class="metric-value" style="color: var(--plath-orange);">{{matrixId}}</div>
            </div>
        </div>

        <div class="story-section">
            <div class="story-header">
                <h2 class="story-title">The Generated Narrative</h2>
                <span style="color: var(--plath-text-dim);">// RUN_01</span>
            </div>
            <div class="story-body">
                <p>{{generatedStory}}</p>
            </div>
        </div>

        <div class="action-footer">
            <button class="btn btn-secondary" onclick="window.print()">Export Webstory</button>
            <a href="https://plath.vercel.app" class="btn btn-primary">Restart Engine</a>
        </div>
    </div>
</body>
</html>
